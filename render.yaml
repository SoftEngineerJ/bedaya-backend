services:
  # Spring Boot Backend Service
  - type: web
    name: bedaya-backend
    runtime: docker
    plan: free
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/bedaya-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod"
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080

databases:
  # PostgreSQL Database
  - name: bedaya-db
    databaseName: bedaya
    user: bedaya_user
    plan: free
