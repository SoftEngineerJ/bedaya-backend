# Production Configuration
# Copy this to application.properties when deploying to production

spring.application.name=bedaya
server.port=8080

# MySQL Database Configuration (Production)
spring.datasource.url=jdbc:mysql://localhost:3306/bedaya_db?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=bedaya_user
spring.datasource.password=CHANGE_THIS_PASSWORD_IN_PRODUCTION

# JPA Settings (Production)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled in production)
# spring.h2.console.enabled=false

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mazroo.develop@gmail.com
spring.mail.password=CHANGE_THIS_APP_PASSWORD_IN_PRODUCTION
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*

# Production Security Settings
# Consider adding these for production
# management.endpoints.web.exposure.include=health,info
# management.endpoint.health.show-details=when-authorized
